name: Auto Merge Movies Data

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

permissions:
  contents: write # নতুন ফাইল পুশ করার জন্য এই পারমিশনটি জরুরি

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Python Script
        run: python merge_movies.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add all_movies.json
          git commit -m "Auto-merged all movies data 🚀 [skip ci]" || echo "No changes to commit"
          git push
