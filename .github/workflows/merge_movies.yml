name: Auto Merge Movies Data

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    env: # এই অংশটি ওয়ার্নিং বন্ধ করতে সাহায্য করবে
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python Script
        run: python merge_movies.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add all_movies.json
          git commit -m "Auto-merged all movies data 🚀 [skip ci]" || echo "No changes to commit"
          git push
