name: Auto Merge Movies Data

on:
  push:
    paths:
      - 'Movies/**' # Movies ফোল্ডারে কোনো পরিবর্তন হলেই এই অ্যাকশন চলবে
  workflow_dispatch: # আপনি চাইলে ম্যানুয়ালিও রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Python Script
        run: python merge_movies.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add all_movies.json
          git commit -m "Auto-merged all movies data 🚀 [skip ci]" || echo "No changes to commit"
          git push
