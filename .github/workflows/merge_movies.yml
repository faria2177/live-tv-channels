name: Auto Merge and Status Check

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # এটি থাকলে আপনি মেনু থেকে ম্যানুয়ালি রান করতে পারবেন

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Python Script
        run: python merge_movies.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add all_movies.json offline.json
          git commit -m "Auto-update: Files generated 🚀 [skip ci]" || echo "No changes to commit"
          git push
